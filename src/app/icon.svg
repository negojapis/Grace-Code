  </defs>
  
  <!-- Outer Metallic Chevron -->
  <path d="M 112 30 L 144 30 L 245 220 L 195 220 L 128 95 L 61 220 L 11 220 Z" fill="url(#silver)" stroke="#9ca3af" stroke-width="1.5" filter="url(#shadow)" />
  
  <!-- Inner Orange Triangle -->
  <path d="M 128 135 L 178 220 L 78 220 Z" fill="url(#orange)" filter="url(#glow)" />
</svg>
